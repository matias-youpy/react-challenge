<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Booking widget</title>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; max-width: 640px; margin: 2rem auto; padding: 0 1rem; }
      .slot { display: flex; justify-content: space-between; padding: .6rem .8rem; border: 1px solid #ddd; border-radius: 6px; margin-bottom: .4rem; }
      .slot.taken { opacity: .5; }
      button { padding: .4rem .8rem; border: 1px solid #888; border-radius: 4px; background: #fff; cursor: pointer; }
      button:disabled { cursor: not-allowed; }
      form { display: grid; gap: .4rem; margin-top: 1rem; }
      input { padding: .4rem; border: 1px solid #ccc; border-radius: 4px; }
      .ok { color: #060; margin-top: 1rem; }
      .err { color: #a00; margin-top: 1rem; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./App.tsx"></script>
  </body>
</html>
